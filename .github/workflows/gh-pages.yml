name: Deploy preview to GitHub Pages

# Builds the site on every push to `development` and publishes a static
# preview to GitHub Pages so the customer can review before we ship to Vercel.
# The preview is static-only (no serverless functions), so the reserve form
# runs in demo mode (VITE_RESERVE_DEMO=true).

on:
  push:
    branches: [development]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eastcoastev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eastcoastev/package-lock.json

      - run: npm ci

      - name: Build
        env:
          # Served from https://<user>.github.io/EastCoastEV.ca/
          VITE_BASE_PATH: /EastCoastEV.ca/
          VITE_RESERVE_DEMO: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: SPA fallback (404 -> index.html)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: eastcoastev/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
